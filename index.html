<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7f8f9" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta
      name="description"
      content="Мобильное приложение для учёта рабочих смен"
    />
    <title>Учёт смен</title>
    <link rel="stylesheet" href="styles.css?v=20260624-2" />
  </head>

  <body class="home-page-active">
    <div class="app-shell">
      <main class="app-content">
        <!-- Главный экран с формой добавления смены -->
        <section
          id="homePage"
          class="page page--active"
          aria-label="Добавление смены"
          aria-hidden="false"
        >
          <button
            id="profileButton"
            class="home-clock-icon"
            type="button"
            aria-label="Открыть профиль"
          >
            <svg viewBox="0 0 24 24">
              <path d="M12 7v5l3.5 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </button>

          <form id="shiftForm" class="shift-form">
            <div class="field">
              <!-- Скрытое поле хранит дату в формате, который использует JavaScript -->
              <input id="shiftDate" name="shiftDate" type="hidden" required />

              <button
                id="datePickerButton"
                class="date-picker-button"
                type="button"
                aria-label="Выбрать дату смены"
                aria-haspopup="dialog"
                aria-expanded="false"
              >
                <span id="selectedDateText">Выберите дату</span>
                <span class="date-picker-button__icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24">
                    <path d="M6.5 2v3M17.5 2v3M3.5 8.5h17M5 4h14a1.5 1.5 0 0 1 1.5 1.5v14A1.5 1.5 0 0 1 19 21H5a1.5 1.5 0 0 1-1.5-1.5v-14A1.5 1.5 0 0 1 5 4Z" />
                  </svg>
                </span>
              </button>
            </div>

            <div class="time-fields">
              <div class="field">
                <!-- Скрытое поле хранит выбранное время начала -->
                <input
                  id="startTime"
                  name="startTime"
                  type="hidden"
                  required
                />
                <button
                  id="startTimeButton"
                  class="time-picker-button"
                  type="button"
                  aria-label="Выбрать время начала смены"
                  aria-haspopup="dialog"
                  aria-expanded="false"
                >
                  <span id="startTimeText">--:--</span>
                  <span class="time-picker-button__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 7v5l3.5 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                  </span>
                </button>
              </div>

              <div class="field">
                <!-- Скрытое поле хранит выбранное время окончания -->
                <input
                  id="endTime"
                  name="endTime"
                  type="hidden"
                  required
                />
                <button
                  id="endTimeButton"
                  class="time-picker-button"
                  type="button"
                  aria-label="Выбрать время окончания смены"
                  aria-haspopup="dialog"
                  aria-expanded="false"
                >
                  <span id="endTimeText">--:--</span>
                  <span class="time-picker-button__icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M12 7v5l3.5 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                  </span>
                </button>
              </div>
            </div>

            <button id="saveButton" class="save-button" type="submit">
              Сохранить
            </button>
            <button id="cancelEditButton" class="cancel-edit-button" type="button" hidden>
              Отменить изменение
            </button>
          </form>

          <!-- Сообщение появляется после успешного сохранения -->
          <p id="saveMessage" class="save-message" role="status" aria-live="polite">
            <svg class="save-message__icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 12.5 4.2 4.2L19 7" />
            </svg>
            <span id="saveMessageText" class="save-message__text"></span>
          </p>
        </section>

        <!-- Экран со сменами за выбранный месяц -->
        <section
          id="calendarPage"
          class="page page--right"
          aria-labelledby="historyTitle"
          aria-hidden="true"
          inert
        >
          <div class="calendar-heading">
            <div>
              <h1 id="historyTitle">История</h1>
            </div>
            <button
              id="shiftCount"
              class="shift-count"
              type="button"
              aria-label="Открыть расчёт примерной выплаты"
            >
              0
            </button>
          </div>

          <div class="month-picker-card">
            <!-- Скрытое поле хранит выбранный месяц для JavaScript -->
            <input id="monthSelect" name="monthSelect" type="hidden" />

            <div class="history-month-control">
              <button
                id="previousHistoryMonthButton"
                class="history-month-arrow"
                type="button"
                aria-label="Предыдущий сохранённый месяц"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m15 18-6-6 6-6" />
                </svg>
              </button>

              <span id="selectedMonthText" class="history-month-control__value"></span>

              <button
                id="nextHistoryMonthButton"
                class="history-month-arrow"
                type="button"
                aria-label="Следующий сохранённый месяц"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="m9 18 6-6-6-6" />
                </svg>
              </button>
            </div>
          </div>

          <!-- Прокручивается только эта область со сменами -->
          <div class="history-scroll-area">
            <!-- JavaScript добавит сюда карточки сохранённых смен -->
            <div id="shiftList" class="shift-list"></div>

            <div id="emptyState" class="empty-state" hidden>
              <div class="empty-state__icon" aria-hidden="true">—</div>
              <p>Нет сохранённых смен за этот месяц</p>
            </div>
          </div>
        </section>

        <!-- Экран регистрации, входа и состояния облачной синхронизации -->
        <section
          id="profilePage"
          class="page page--right"
          aria-labelledby="profileTitle"
          aria-hidden="true"
          inert
        >
          <div class="profile-page__header">
            <button
              id="closeProfileButton"
              class="profile-back-button"
              type="button"
              aria-label="Вернуться на главную"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m15 18-6-6 6-6" />
              </svg>
            </button>

            <div>
              <p class="profile-page__eyebrow">Облачное сохранение</p>
              <h1 id="profileTitle">Профиль</h1>
            </div>
          </div>

          <div class="profile-card">
            <div id="authGuestView">
              <div class="auth-tabs" role="tablist" aria-label="Авторизация">
                <button
                  id="loginTabButton"
                  class="auth-tab auth-tab--active"
                  type="button"
                  role="tab"
                  aria-selected="true"
                  aria-controls="loginForm"
                >
                  Вход
                </button>
                <button
                  id="registerTabButton"
                  class="auth-tab"
                  type="button"
                  role="tab"
                  aria-selected="false"
                  aria-controls="registerForm"
                >
                  Регистрация
                </button>
              </div>

              <form id="loginForm" class="auth-form" autocomplete="on">
                <label class="auth-field">
                  <span>Email</span>
                  <input
                    type="email"
                    name="username"
                    autocomplete="email"
                    autocapitalize="none"
                    spellcheck="false"
                    placeholder="name@example.com"
                    required
                  />
                </label>

                <label class="auth-field">
                  <span>Пароль</span>
                  <input
                    type="password"
                    name="password"
                    autocomplete="current-password"
                    placeholder="Введите пароль"
                    required
                  />
                </label>

                <button class="auth-submit-button" type="submit">Войти</button>
                <button
                  id="forgotPasswordButton"
                  class="forgot-password-button"
                  type="button"
                >
                  Забыли пароль?
                </button>
              </form>

              <form
                id="registerForm"
                class="auth-form"
                autocomplete="on"
                hidden
              >
                <label class="auth-field">
                  <span>Имя</span>
                  <input
                    type="text"
                    name="name"
                    autocomplete="name"
                    placeholder="Ваше имя"
                    required
                  />
                </label>

                <label class="auth-field">
                  <span>Email</span>
                  <input
                    type="email"
                    name="email"
                    autocomplete="email"
                    autocapitalize="none"
                    spellcheck="false"
                    placeholder="name@example.com"
                    required
                  />
                </label>

                <label class="auth-field">
                  <span>Пароль</span>
                  <input
                    type="password"
                    name="new-password"
                    autocomplete="new-password"
                    minlength="6"
                    placeholder="Минимум 6 символов"
                    required
                  />
                </label>

                <button class="auth-submit-button" type="submit">
                  Создать профиль
                </button>
              </form>
            </div>

            <div id="authUserView" class="account-view" hidden>
              <div class="account-avatar" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM4.5 21a7.5 7.5 0 0 1 15 0" />
                </svg>
              </div>
              <h2 id="accountName">Пользователь</h2>
              <p id="accountEmail" class="account-email"></p>
              <div class="account-sync-status">
                <span class="account-sync-status__dot"></span>
                <span id="accountSyncText">Данные синхронизированы</span>
              </div>
              <button id="logoutButton" class="logout-button" type="button">
                Выйти из профиля
              </button>
            </div>

            <p id="authPreviewMessage" class="auth-preview-message" role="status">
              Подключение Firebase ожидает настройки
            </p>
          </div>
        </section>
      </main>

      <!-- Нижняя навигация всегда остаётся доступной -->
      <nav class="bottom-navigation" aria-label="Основная навигация">
        <button
          class="nav-button nav-button--active"
          type="button"
          data-page="homePage"
          aria-current="page"
        >
          <span class="nav-button__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M3 10.8 12 3l9 7.8v9.7a.5.5 0 0 1-.5.5h-5.7v-6.2H9.2V21H3.5a.5.5 0 0 1-.5-.5v-9.7Z" />
            </svg>
          </span>
          <span>Главная</span>
        </button>

        <button class="nav-button" type="button" data-page="calendarPage">
          <span class="nav-button__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6.5 2v3M17.5 2v3M3.5 8.5h17M5 4h14a1.5 1.5 0 0 1 1.5 1.5v14A1.5 1.5 0 0 1 19 21H5a1.5 1.5 0 0 1-1.5-1.5v-14A1.5 1.5 0 0 1 5 4Z" />
            </svg>
          </span>
          <span>История</span>
        </button>
      </nav>
    </div>

    <!-- Собственный календарь вместо стандартного календаря браузера -->
    <div id="datePickerOverlay" class="date-picker-overlay" hidden>
      <div
        class="date-picker"
        role="dialog"
        aria-modal="true"
        aria-labelledby="datePickerTitle"
      >
        <div class="date-picker__header">
          <button
            id="previousMonthButton"
            class="month-arrow"
            type="button"
            aria-label="Предыдущий месяц"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>

          <h2 id="datePickerTitle" class="date-picker__title"></h2>

          <button
            id="nextMonthButton"
            class="month-arrow"
            type="button"
            aria-label="Следующий месяц"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 18 6-6-6-6" />
            </svg>
          </button>
        </div>

        <div class="weekdays" aria-hidden="true">
          <span>Пн</span>
          <span>Вт</span>
          <span>Ср</span>
          <span>Чт</span>
          <span>Пт</span>
          <span>Сб</span>
          <span>Вс</span>
        </div>

        <div id="calendarDays" class="calendar-days"></div>

        <button id="todayButton" class="today-button" type="button">
          Выбрать сегодня
        </button>
      </div>
    </div>

    <!-- Действия с выбранной сменой: изменение или удаление -->
    <div id="shiftActionsOverlay" class="shift-actions-overlay" hidden>
      <div
        class="shift-actions-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="shiftActionsTitle"
      >
        <div class="shift-actions-dialog__header">
          <div>
            <p class="shift-actions-dialog__caption">Сохранённая смена</p>
            <h2 id="shiftActionsTitle"></h2>
          </div>
          <button
            id="closeShiftActionsButton"
            class="close-dialog-button"
            type="button"
            aria-label="Закрыть"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <p id="shiftActionsTime" class="shift-actions-dialog__time"></p>

        <div class="shift-actions-dialog__buttons">
          <button id="editShiftButton" class="edit-shift-button" type="button">
            Изменить
          </button>
          <button id="deleteShiftButton" class="delete-shift-button" type="button">
            Удалить
          </button>
        </div>
      </div>
    </div>

    <!-- Детальный расчёт часов и примерной выплаты за выбранный месяц -->
    <div id="salaryEstimateOverlay" class="salary-estimate-overlay" hidden>
      <div
        class="salary-estimate-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="salaryEstimateTitle"
      >
        <div class="salary-estimate-dialog__header">
          <div>
            <p
              id="salaryEstimateMonth"
              class="salary-estimate-dialog__caption"
            ></p>
            <h2 id="salaryEstimateTitle">Расчёт примерной выплаты</h2>
          </div>
          <button
            id="closeSalaryEstimateButton"
            class="close-dialog-button"
            type="button"
            aria-label="Закрыть расчёт"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <div class="salary-estimate-details">
          <div class="salary-estimate-row">
            <span>Всего часов</span>
            <strong id="salaryTotalHours">0</strong>
          </div>
          <div id="salaryBreakdown" class="salary-breakdown"></div>
        </div>

        <div class="salary-estimate-total">
          <span>Примерная выплата</span>
          <strong id="salaryTotalAmount">0 ₩</strong>
        </div>
      </div>
    </div>

    <!-- Выбор времени кнопками со стрелками -->
    <div id="timePickerOverlay" class="time-picker-overlay" hidden>
      <div
        class="time-picker-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="timePickerTitle"
      >
        <div class="time-picker-dialog__header">
          <h2 id="timePickerTitle">Начало смены</h2>
          <button
            id="closeTimePickerButton"
            class="close-dialog-button"
            type="button"
            aria-label="Закрыть выбор времени"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>

        <div class="time-stepper">
          <div class="time-stepper__column">
            <span class="time-stepper__label">Часы</span>
            <button
              id="increaseHourButton"
              class="time-stepper__arrow"
              type="button"
              aria-label="Увеличить часы"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 15 6-6 6 6" />
              </svg>
            </button>
            <span id="hourValue" class="time-stepper__value">09</span>
            <button
              id="decreaseHourButton"
              class="time-stepper__arrow"
              type="button"
              aria-label="Уменьшить часы"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
          </div>

          <span class="time-stepper__separator" aria-hidden="true">:</span>

          <div class="time-stepper__column">
            <span class="time-stepper__label">Минуты</span>
            <button
              id="increaseMinuteButton"
              class="time-stepper__arrow"
              type="button"
              aria-label="Увеличить минуты"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 15 6-6 6 6" />
              </svg>
            </button>
            <span id="minuteValue" class="time-stepper__value">00</span>
            <button
              id="decreaseMinuteButton"
              class="time-stepper__arrow"
              type="button"
              aria-label="Уменьшить минуты"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
          </div>
        </div>

        <button id="confirmTimeButton" class="confirm-time-button" type="button">
          Готово
        </button>
      </div>
    </div>

    <script type="module" src="script.js?v=20260624-2"></script>
  </body>
</html>
